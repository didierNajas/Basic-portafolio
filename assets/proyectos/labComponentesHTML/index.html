<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="container">
    <h1>Task Manager</h1>

    <!-- Contador -->
    <p>
        <span id="completadas">0</span> de 
        <span id="total">0</span> tareas completadas
    </p>

    <!-- Formulario -->
    <input type="text" id="inputTarea" placeholder="Escribe una tarea">

    <select id="categoria">
        <option value="Trabajo">Trabajo</option>
        <option value="Estudio">Estudio</option>
        <option value="Personal"> Personal</option>
        <option value="Urgente"> Urgente</option>
        <option value="otra">Otra...</option>
    </select>

    <input type="text" id="otraCategoria" placeholder="Escribe categoría" style="display:none;">

    <button onclick="agregarTarea()">Agregar</button>

    <p id="error" class="error"></p>

    <!-- Lista -->
    <ul id="lista"></ul>

    <!-- Extra -->
    <button onclick="limpiarCompletadas()">Limpiar completadas</button>

</div>

<script src="app.js"></script>
</body>
</html>
